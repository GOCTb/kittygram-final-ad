name: Kittygram CI/CD

on:
  push:
    branches:
      - main

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        # Проброс портов не обязателен, сервис доступен по имени "postgres"
        ports:
          - 5432:5432
        # Проверка готовности: pg_isready с нашими параметрами
        options: >-
          --health-cmd "pg_isready -U test_user -d test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install system dependencies for Pillow
      run: |
        sudo apt-get update
        sudo apt-get install -y libjpeg-dev zlib1g-dev libfreetype-dev

    - name: Install backend dependencies
      run: |
        pip install -r backend/requirements.txt
        pip install ruff

    - name: Lint backend with ruff
      run: ruff check backend/

    - name: Wait for PostgreSQL to be ready
      run: |
        until pg_isready -h postgres -U test_user -d test_db; do
          echo "Waiting for postgres..."
          sleep 2
        done

    - name: Run backend tests
      env:
        DJANGO_SECRET_KEY: test-secret-key
        DEBUG: "False"
        POSTGRES_DB: test_db
        POSTGRES_USER: test_user
        POSTGRES_PASSWORD: test_pass
        DB_HOST: postgres       # Имя сервиса
        DB_PORT: 5432
      run: |
        cd backend
        python manage.py test

    - name: Set up Node
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install frontend dependencies
      run: |
        cd frontend
        npm ci

    - name: Run frontend tests
      run: |
        cd frontend
        npm test -- --watchAll=false

  build_and_push:
    needs: tests
    runs-on: ubuntu-latest
    if: success()
    steps:
    - uses: actions/checkout@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push backend
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/kittygram_backend:latest

    - name: Build and push frontend
      uses: docker/build-push-action@v4
      with:
        context: ./frontend
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/kittygram_frontend:latest

    - name: Build and push gateway
      uses: docker/build-push-action@v4
      with:
        context: ./nginx
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/kittygram_gateway:latest

    - name: Send Telegram notification
      if: success()
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_CHAT_ID }}
        token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        message: |
          ✅ Kittygram workflow completed successfully!
          Commit: ${{ github.sha }}